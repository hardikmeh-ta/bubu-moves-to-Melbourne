<style>
:root {
  --bg:#f6f5f3;--surface:#ffffff;--surface2:#f0efed;--border:rgba(0,0,0,0.09);--border-med:rgba(0,0,0,0.16);

  --danger-bg:#fef2f2;--warning-bg:#fffbeb;--success-bg:#f0fdf4;--info-bg:#eff6ff;
  --danger-border:rgba(220,38,38,0.2);--warning-border:rgba(217,119,6,0.2);
  --success-border:rgba(22,163,74,0.2);--info-border:rgba(37,99,235,0.2);

@media(prefers-color-scheme:dark){

    --bg:#111110;--surface:#1c1c1a;--surface2:#242422;--border:rgba(255,255,255,0.09);--border-med:rgba(255,255,255,0.16);

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.8}
input,select,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border-med);border-radius:var(--radius);padding:7px 10px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--text3);box-shadow:0 0 0 3px rgba(0,0,0,0.05)}
textarea{resize:vertical;min-height:60px}
a{color:inherit}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:var(--text2)}
.spinner{width:28px;height:28px;border:2px solid var(--border-med);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);border:1px solid var(--border-med);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:500}
.btn-primary{background:var(--text);color:var(--surface);border-color:var(--text)}
.btn-sm{padding:4px 9px;font-size:12px}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.photo-thumb{width:72px;height:72px;border-radius:var(--radius);object-fit:cover;border:1px solid var(--border);cursor:pointer}
.photo-thumb-wrap{position:relative;width:72px;height:72px}
.photo-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;opacity:0}
.photo-thumb-wrap:hover .photo-del{opacity:1}
.cal-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius-lg);padding:4px;z-index:200;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.cal-menu a,.cal-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;color:var(--text);text-decoration:none;font-size:13px;border-radius:var(--radius);border:none;background:none;text-align:left;cursor:pointer}
.cal-menu a:hover,.cal-menu button:hover{background:var(--surface2)}
.phase-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;width:60px}
.phase-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.task-row{padding:11px 16px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-row.done{opacity:.5}
.task-check{width:16px;height:16px;border-radius:4px;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border-med);background:transparent;display:flex;align-items:center;justify-content:center;cursor:default;transition:border-color .2s,background .2s}
.task-check.checkable{cursor:pointer}
.task-check.checked{background:currentColor}
.notes-view{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5}

.progress-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

const fmt=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'})};
const daysLeft=()=>Math.ceil((new Date('2026-07-29')-new Date())/86400000);
const gCalURL=t=>{const d=(t.due_by||'2026-07-29').replace(/-/g,'');return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('[Move] '+t.title)}&dates=${d}/${d}&details=${encodeURIComponent(t.notes||'')}&sf=true&output=xml`};
const genICS=tasks=>{const l=['BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','PRODID:-//Move Planner//EN'];tasks.forEach(t=>{const d=(t.due_by||'2026-07-29').replace(/-/g,'');l.push('BEGIN:VEVENT',`DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,`SUMMARY:[Move] ${t.title}`,`DESCRIPTION:${(t.notes||'').replace(/\n/g,'\\n')}`,`UID:move-${t.id}@planner`,'BEGIN:VALARM','TRIGGER:-P3D','ACTION:DISPLAY',`DESCRIPTION:Reminder: ${t.title}`,'END:VALARM','END:VEVENT')});l.push('END:VCALENDAR');return l.join('\r\n')};
const dlICS=(tasks,name='amanda-move.ics')=>{const b=new Blob([genICS(tasks)],{type:'text/calendar;charset=utf-8'});const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:name});a.click()};
const extractStoragePath=url=>{try{return decodeURIComponent(url.split('/item-photos/')[1]);}catch{return null}};

// ── DB Operations ─────────────────────────────────────────────────────────────
async function initAndLoadTasks(){
  const {count}=await db.from('tasks').select('*',{count:'exact',head:true});
  if(!count){
    const rows=PRESET.map(t=>({id:t.id,title:t.title,category:t.category,owner:t.owner,phase:t.phase,due_by:t.due_by,priority:t.priority,notes:t.notes,done:false,inventory_id:null}));
    const chunks=[];for(let i=0;i<rows.length;i+=20)chunks.push(rows.slice(i,i+20));
    for(const chunk of chunks)await db.from('tasks').insert(chunk);
  }
  const {data}=await db.from('tasks').select('*').order('created_at');
  return data||[];
}
async function loadInventory(){
  const {data}=await db.from('inventory').select('*').order('created_at');
  return data||[];
}
async function toggleTask(id,done){
  await db.from('tasks').update({done:!done}).eq('id',id);
}
async function saveTaskNotes(id,notes){
  await db.from('tasks').update({notes}).eq('id',id);
}
async function addInventoryItem(item,sellTask){
  await db.from('inventory').insert(item);
  if(sellTask)await db.from('tasks').insert(sellTask);
}
async function saveInventoryNotes(id,notes){
  await db.from('inventory').update({notes}).eq('id',id);
}
async function removeInventoryItem(item){
  if(item.photo_urls&&item.photo_urls.length){
    const paths=item.photo_urls.map(extractStoragePath).filter(Boolean);
    if(paths.length)await db.storage.from('item-photos').remove(paths);
  }
  await db.from('tasks').delete().eq('inventory_id',item.id);
  await db.from('inventory').delete().eq('id',item.id);
}
async function uploadPhoto(itemId,file,currentUrls){
  const ext=file.name.split('.').pop()||'jpg';
  const path=`${itemId}/${Date.now()}.${ext}`;
  const {error}=await db.storage.from('item-photos').upload(path,file,{contentType:file.type,upsert:false});
  if(error)throw error;
  const {data:{publicUrl}}=db.storage.from('item-photos').getPublicUrl(path);
  const newUrls=[...(Array.isArray(currentUrls)?currentUrls:[]),publicUrl];
  await db.from('inventory').update({photo_urls:newUrls}).eq('id',itemId);
  return newUrls;
}
async function removePhoto(itemId,url,currentUrls){
  const path=extractStoragePath(url);
  if(path)await db.storage.from('item-photos').remove([path]);
  const newUrls=(Array.isArray(currentUrls)?currentUrls:[]).filter(u=>u!==url);
  await db.from('inventory').update({photo_urls:newUrls}).eq('id',itemId);
  return newUrls;
}

// ── ProgressRing ──────────────────────────────────────────────────────────────
function ProgressRing({pct,size=88,color='#1a1918'}){
  const stroke=6,r=(size-stroke)/2,circ=2*Math.PI*r;
  return e('div',{className:'progress-ring-wrap',style:{width:size,height:size}},
    e('svg',{width:size,height:size,style:{transform:'rotate(-90deg)',position:'absolute',top:0,left:0},'aria-hidden':'true'},
      e('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'var(--border-med)',strokeWidth:stroke}),
      e('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:stroke,strokeDasharray:circ,strokeDashoffset:circ-(pct/100)*circ,strokeLinecap:'round',style:{transition:'stroke-dashoffset .5s ease'}})),
    e('div',{className:'progress-ring-label'},
      e('div',{style:{fontSize:18,fontWeight:600,lineHeight:1}},pct,'%'),
      e('div',{style:{fontSize:10,color:'var(--text3)'}},pct===100?'🎉':'done')));
}

  useEffect(()=>{

  },[]);

  const handleToggle=async(id,done)=>{

  const handleInvNotes=(id,notes)=>setInventory(p=>p.map(i=>i.id===id?{...i,notes}:i));
  const setR=r=>{setRole(r);localStorage.setItem('move_role2',r)};

  if(loading)return e('div',{className:'loading-screen'},e('div',{className:'spinner'}),e('span',null,'Loading your plan…'));
  if(error)return e('div',{className:'loading-screen'},e('i',{className:'ti ti-alert-circle',style:{fontSize:32,color:'var(--danger)'}}),e('span',{style:{color:'var(--danger)'}},error));

  return e('div',{style:{minHeight:'100vh'}},
    // Header

        e('div',{style:{fontSize:15,fontWeight:600}},"Amanda's Melbourne Move ✈️"),
        e('div',{style:{fontSize:11,color:'var(--text2)',marginTop:1}},'July 29, 2026 · ',daysLeft(),' days to go')),
      e('button',{onClick:()=>setR(role==='amanda'?'viewer':'amanda'),className:'btn',style:{background:role==='amanda'?'var(--success-bg)':'',color:role==='amanda'?'var(--success)':'',borderColor:role==='amanda'?'var(--success-border)':''}},
        e('i',{className:`ti ${role==='amanda'?'ti-user-check':'ti-eye'}`,'aria-hidden':'true'}),
        role==='amanda'?'Amanda mode':'View only')),
    // Tabs
    e('div',{style:{borderBottom:'1px solid var(--border)',display:'flex',background:'var(--surface)'}},
      [['overview','Overview'],['checklist','Checklist'],['inventory','Inventory']].map(([id,label])=>
        e('button',{key:id,onClick:()=>setTab(id),style:{padding:'10px 20px',background:'none',border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===id?600:400,color:tab===id?'var(--text)':'var(--text2)',borderBottom:tab===id?'2px solid var(--text)':'2px solid transparent',marginBottom:-1}},label))),
    // Content
    e('div',{style:{padding:18,maxWidth:860,margin:'0 auto'}},
      tab==='overview'&&e(Overview,{tasks,inventory,setTab,role}),
      tab==='checklist'&&e(Checklist,{tasks,onToggle:handleToggle,onNotesChange:handleTaskNotes,role}),
      tab==='inventory'&&e(Inventory,{inventory,onAdd:handleAddItem,onRemove:handleRemoveItem,onPhotosChange:handlePhotosChange,onNotesChange:handleInvNotes,role})));
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
